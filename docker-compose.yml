services:
  app:
    build:
      context: .
      target: app-runtime
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - minhwatu-data:/app/data
    expose:
      - "8080"

  web:
    build:
      context: .
      target: web-runtime
    depends_on:
      - app
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  minhwatu-data:
